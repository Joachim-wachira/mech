# ============================================================
# Mech Platform — Render.com Deployment Blueprint
# Deploy: Push to GitHub → Render Dashboard → New Blueprint
# ============================================================

services:

  # ── Backend API + WebSocket (Native Python — Free Plan) ──────
  - type: web
    name: mech-backend
    runtime: python
    rootDir: backend
    region: frankfurt
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 app:application

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mech-db
          property: connectionString
      - key: SMS_PROVIDER
        value: stub
      - key: AFRICASTALKING_USERNAME
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: SMS_SENDER
        value: MECH
      - key: NEARBY_RADIUS_KM
        value: "25"

  # ── Static Frontend (Free) ───────────────────────────────────
  - type: web
    name: mech-frontend
    runtime: static
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /css/*
        name: Cache-Control
        value: public, max-age=604800
      - path: /js/*
        name: Cache-Control
        value: public, max-age=604800
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database (Free) ────────────────────────────────
databases:
  - name: mech-db
    databaseName: mech
    user: mech_admin
    plan: free
    postgresMajorVersion: "16"
