<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>mech — Connect with Mechanics &amp; Spare Shops</title>

  <!-- ── PWA Manifest ───────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json"/>

  <!-- ── Theme colours ─────────────────────────────────────── -->
  <meta name="theme-color" content="#6b21c8"/>
  <meta name="msapplication-TileColor" content="#1a0533"/>
  <meta name="msapplication-TileImage" content="icons/icon-144.png"/>

  <!-- ── iOS / Safari PWA ──────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="mech"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png"/>

  <!-- ── Open Graph (share preview) ────────────────────────── -->
  <meta property="og:title" content="mech — On-Demand Auto Help"/>
  <meta property="og:description" content="Connecting drivers with trusted mechanics, spare shops and emergency teams."/>
  <meta property="og:image" content="icons/icon-512.png"/>
  <meta property="og:type" content="website"/>

  <!-- ── Description ───────────────────────────────────────── -->
  <meta name="description" content="Connecting drivers with qualified and trusted mechanics, spare shops and emergency rescue teams in Kenya."/>
  <meta name="keywords" content="mechanic, spare parts, auto repair, Kenya, driver, emergency"/>

  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.SVG"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
</head>
<body>
<div class="page-wrapper" style="justify-content:center;min-height:100vh;padding-top:0;">
  <div style="display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:32px 16px;">

    <!-- Logo -->
    <div style="display:flex;flex-direction:column;align-items:flex-start;margin-bottom:24px;">
      <div class="logo-ripple-wrap" style="width:110px;height:110px;margin-left:auto;margin-right:auto;margin-bottom:20px;">
        <span class="ripple-ring ripple-ring-1"></span>
        <span class="ripple-ring ripple-ring-2"></span>
        <span class="ripple-ring ripple-ring-3"></span>
        <div class="logo-circle" style="width:110px;height:110px;">
          <img src="logo.SVG" alt="mech logo" style="width:86px;height:86px;"/>
        </div>
      </div>
      <h1 class="logo-name" style="font-size:2.4rem;font-weight:900;margin-bottom:10px;">mech</h1>
      <p style="color:var(--text-light);font-size:1.05rem;line-height:1.6;max-width:400px;margin-bottom:32px;">
        Connecting drivers with qualified and trusted mechanics, spareshops and emergency team
      </p>

      <p style="color:var(--text-light);font-size:1rem;font-weight:600;margin-bottom:16px;">Get started as...</p>

      <div class="role-buttons">
        <button class="role-btn btn-blue" data-role="driver" onclick="window.location.href='register_driver.html'">
          🚗 Driver
        </button>
        <button class="role-btn btn-orange" data-role="mechanic" onclick="window.location.href='register_mechanic.html'">
          🔧 Mechanic
        </button>
        <button class="role-btn btn-green" data-role="spareshop" onclick="window.location.href='register_spareshop.html'">
          🛒 spareshop
        </button>
      </div>

      <div style="margin-top:24px;">
        <!-- Admin access: hidden from regular users, accessible only via /dashboard_admin.html
             when logged in as admin role. The link is invisible but keyboard-accessible
             for legitimate admins who know the URL. -->
        <span id="adminLinkWrap" style="display:none;">
          <a href="dashboard_admin.html" style="color:rgba(255,255,255,0.35);font-size:0.72rem;text-decoration:none;letter-spacing:0.5px;">⚙ Admin</a>
        </span>
      </div>
    </div>

  </div>

  <footer class="page-footer">© <span id="yr"></span> mech. All rights reserved.</footer>
</div>


<script src="js/app.js"></script>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
