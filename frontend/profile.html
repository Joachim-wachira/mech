<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6b21c8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="mech"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>mech — My Profile</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.SVG"/>
  <style>
    .profile-avatar {
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--magenta),var(--cyan-accent));
      display:flex;align-items:center;justify-content:center;
      font-size:2.5rem;margin:0 auto 12px;
    }
    .profile-section {
      background:#fff;border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;
    }
    .profile-section h3 {
      font-size:0.82rem;font-weight:900;color:var(--text-dark);
      margin-bottom:14px;border-bottom:1px solid #f3f4f6;padding-bottom:8px;
    }
    .profile-field { margin-bottom:12px; }
    .profile-field label {
      display:block;font-size:0.72rem;font-weight:700;
      color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;
    }
    .profile-field input {
      width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;
      border-radius:var(--radius-md);font-size:0.88rem;
      background:#f9fafb;color:var(--text-dark);
      box-sizing:border-box;transition:border-color 0.2s;
    }
    .profile-field input:focus {
      outline:none;border-color:var(--purple-light);background:#fff;
    }
    .profile-field input[readonly] {
      background:#f3f4f6;color:#9ca3af;cursor:not-allowed;
    }
    .rating-badge {
      display:inline-flex;align-items:center;gap:6px;
      background:linear-gradient(135deg,#fbbf24,#f59e0b);
      color:#fff;border-radius:99px;padding:4px 12px;
      font-weight:800;font-size:0.88rem;
    }
  </style>
</head>
<body>
<div class="page-wrapper has-bottom-nav">

  <!-- Header -->
  <div class="logo-block" style="padding:18px 0 10px;">
    <div class="logo-ripple-wrap" style="width:60px;height:60px;">
      <span class="ripple-ring ripple-ring-1"></span>
      <span class="ripple-ring ripple-ring-2"></span>
      <div class="logo-circle" style="width:60px;height:60px;">
        <img src="logo.SVG" alt="mech" style="width:44px;height:44px;"/>
      </div>
    </div>
    <span class="logo-name" style="font-size:1.3rem;">mech</span>
    <h2 style="font-family:var(--font-display);font-size:1.4rem;font-weight:900;color:var(--text-white);">My Profile</h2>
  </div>

  <!-- Avatar & Role -->
  <div style="text-align:center;margin-bottom:16px;">
    <div class="profile-avatar">👤</div>
    <div style="font-size:1rem;font-weight:800;color:#fff;" id="profileDisplayName">Loading...</div>
    <div style="margin-top:6px;">
      <span class="rating-badge">⭐ <span id="profileRatingAvg">--</span></span>
      <span style="font-size:0.75rem;color:rgba(255,255,255,0.6);margin-left:8px;" id="profileRatingCount">0 reviews</span>
    </div>
    <div style="margin-top:6px;font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.08em;" id="profileRole">--</div>
  </div>

  <!-- Profile Info Section -->
  <div class="profile-section">
    <h3>📋 Account Information</h3>

    <div class="profile-field">
      <label>Full Name</label>
      <input type="text" id="profileName" placeholder="Your full name"/>
    </div>

    <div class="profile-field">
      <label>Business / Shop Name</label>
      <input type="text" id="profileBusiness" placeholder="Business name (optional)"/>
    </div>

    <div class="profile-field">
      <label>Email</label>
      <input type="email" id="profileEmail" placeholder="Email address" readonly/>
    </div>

    <div class="profile-field">
      <label>Phone</label>
      <input type="tel" id="profilePhone" placeholder="+254..."/>
    </div>

    <div class="profile-field">
      <label>Location</label>
      <input type="text" id="profileLocation" placeholder="City, County"/>
    </div>

    <button id="saveProfileBtn" class="btn btn-blue btn-full" style="margin-top:6px;">
      💾 Save Changes
    </button>
  </div>

  <!-- Change Password Section -->
  <div class="profile-section">
    <h3>🔒 Change Password</h3>

    <div class="profile-field">
      <label>Current Password</label>
      <div style="position:relative;">
        <input type="password" id="currentPassword" placeholder="Current password"/>
        <button class="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;">👁</button>
      </div>
    </div>

    <div class="profile-field">
      <label>New Password</label>
      <div style="position:relative;">
        <input type="password" id="newPassword" placeholder="New password (min. 8 characters)"/>
        <button class="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;">👁</button>
      </div>
    </div>

    <div class="profile-field">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat new password"/>
    </div>

    <button id="changePasswordBtn" class="btn btn-purple btn-full" style="margin-top:6px;">
      🔑 Update Password
    </button>
  </div>

  <!-- Logout -->
  <div class="profile-section" style="text-align:center;">
    <button id="logoutBtn" class="btn btn-red btn-full">
      🚪 Log Out
    </button>
  </div>

  <footer class="page-footer" style="padding-bottom:6px;">© <span id="yr"></span> mech. All rights reserved.</footer>
</div>

<!-- Bottom Nav (role-aware, JS will set correct target) -->
<nav class="dash-bottom-nav" style="left:0;right:0;max-width:900px;margin:0 auto;">
  <button class="dash-nav-tab" id="navHome">
    <span class="d-icon">🏠</span>Dashboard
  </button>
  <button class="dash-nav-tab" data-target="chat.html">
    <span class="d-icon">💬</span>Chats
  </button>
  <button class="dash-nav-tab active" data-target="profile.html">
    <span class="d-icon">👤</span>Profile
  </button>
</nav>

<script src="js/app.js"></script>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// Set dashboard home link based on role
const role = JSON.parse(localStorage.getItem('mech_role') || 'null');
const dashMap = {
  driver:    'dashboard_driver.html',
  mechanic:  'dashboard_mechanic.html',
  spareshop: 'dashboard_spareshop.html',
  admin:     'dashboard_admin.html',
};
const navHome = document.getElementById('navHome');
if (navHome) navHome.dataset.target = dashMap[role] || 'index.html';

// Update display name after profile loads
const observer = new MutationObserver(() => {
  const nameInput = document.getElementById('profileName');
  const displayEl = document.getElementById('profileDisplayName');
  if (nameInput?.value && displayEl) displayEl.textContent = nameInput.value;
});
const nameInput = document.getElementById('profileName');
if (nameInput) observer.observe(nameInput, { attributes: true, attributeFilter:['value'] });
</script>
</body>
</html>
