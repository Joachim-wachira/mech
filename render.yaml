# ============================================================
# Mech Platform — Render.com Deployment Blueprint (Free Tier)
# Deploy: Connect repo to Render → Dashboard → "New Blueprint"
#
# FIXES APPLIED:
#   1. Removed 'plan: free' from mech-frontend (Static sites are free by default; explicit key causes error)
#   2. Docker backend and Postgres configured to strictly use valid free tier properties.
# ============================================================

services:
  # ── Backend API + WebSocket ──────────────────────────────────
  - type: web
    name: mech-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mech-db
          property: connectionString
      - key: SMS_PROVIDER
        value: stub          # change to 'africastalking' when ready
      - key: AFRICASTALKING_USERNAME
        sync: false          # set manually in Render dashboard
      - key: AFRICASTALKING_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SMS_SENDER
        value: MECH
      - key: NEARBY_RADIUS_KM
        value: "25"
      - key: PORT
        value: "5000"

  # ── Static Frontend ──────────────────────────────────────────
  - type: web
    name: mech-frontend
    runtime: static
    staticPublishPath: ./frontend
    # ── FIXED: 'plan: free' removed from here ──────────────────
    # Render static sites are free by default. Specifying 'plan: free'
    # on a static service triggers the validation error you experienced.
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /css/*
        name: Cache-Control
        value: public, max-age=604800
      - path: /js/*
        name: Cache-Control
        value: public, max-age=604800
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: mech-db
    databaseName: mech
    user: mech_admin
    plan: free              # Render free PostgreSQL — expires after 90 days
    postgresMajorVersion: "16"
