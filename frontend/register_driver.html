<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6b21c8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="mech"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>mech — Driver Registration</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.SVG"/>
  <style>
    /* ── Terms & Conditions checkbox block ── */
    .terms-check-block {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .terms-check-block input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #7c3aed;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .terms-check-block label {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.55;
      cursor: pointer;
    }
    .terms-check-block a {
      color: #22d3ee;
      font-weight: 700;
      text-decoration: underline;
    }
    .terms-error {
      font-size: 0.78rem;
      color: #fca5a5;
      font-weight: 700;
      display: none;
      padding: 4px 2px;
    }
    .alert-msg { padding:10px 14px; border-radius:10px; font-size:0.82rem; font-weight:700; display:none; margin-bottom:4px; }
    .alert-error { background:rgba(239,68,68,0.12); border:1px solid #dc2626; color:#fca5a5; }
    .alert-success { background:rgba(16,185,129,0.12); border:1px solid #16a34a; color:#6ee7b7; }
  </style>
</head>
<body>
<div class="page-wrapper" style="align-items:center;padding-top:0;">
  <div style="width:100%;max-width:460px;padding:28px 0 48px;">

    <!-- Logo -->
    <div class="logo-block">
      <div class="logo-ripple-wrap" style="width:90px;height:90px;">
        <span class="ripple-ring ripple-ring-1"></span>
        <span class="ripple-ring ripple-ring-2"></span>
        <span class="ripple-ring ripple-ring-3"></span>
        <div class="logo-circle"><img src="logo.SVG" alt="mech"/></div>
      </div>
      <span class="logo-name">mech</span>
      <span class="logo-tagline">On-demand automotive help, anywhere in the world.</span>
    </div>

    <h2 class="section-title" style="margin-bottom:6px;">Driver Registration</h2>

    <div id="regAlert" class="alert-msg"></div>

    <form id="driverRegForm" style="display:flex;flex-direction:column;gap:12px;margin-top:20px;" novalidate>

      <!-- Full Name -->
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input class="input-field" type="text" name="full_name" placeholder="Full Name" required autocomplete="name"/>
      </div>

      <!-- Phone -->
      <div class="input-wrapper">
        <span class="input-icon">📞</span>
        <input class="input-field" type="tel" name="phone" id="phoneInput" placeholder="Phone Number (with country code)" required autocomplete="tel"/>
      </div>

      <!-- Email -->
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input class="input-field" type="email" name="email" placeholder="Email Address" required autocomplete="email"/>
      </div>

      <!-- Country -->
      <div class="input-wrapper">
        <span class="input-icon">🌍</span>
        <input class="input-field" type="text" name="country" id="countryInput" placeholder="Country" required/>
      </div>

      <!-- Detect Location -->
      <button type="button" id="detectLocBtn" class="btn btn-white btn-full" style="justify-content:flex-start;padding:13px 42px;font-size:0.95rem;font-weight:800;border-radius:var(--radius-md);">
        📍 DETECT MY LOCATION
      </button>

      <!-- Manual Location -->
      <div class="input-wrapper">
        <span class="input-icon">📌</span>
        <input class="input-field" type="text" name="location_text" id="locationText" placeholder="City / Town / Address"/>
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input class="input-field" type="password" name="password" placeholder="Create Password (min 8 chars)" required autocomplete="new-password" id="driverPw"/>
        <button type="button" data-toggle-pw="driverPw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;" onclick="togglePw('driverPw',this)">👁</button>
      </div>

      <!-- ── Terms & Conditions ────────────────────────────────── -->
      <div class="terms-check-block">
        <input type="checkbox" id="termsAccept" name="terms_accepted"/>
        <label for="termsAccept">
          I have read and agree to the
          <a href="terms.html" target="_blank" rel="noopener">Terms &amp; Conditions</a>
          and
          <a href="terms.html#privacy" target="_blank" rel="noopener">Privacy Policy</a>
          of the mech platform. I confirm I am at least 18 years old.
        </label>
      </div>
      <div id="termsError" class="terms-error">⚠️ You must accept the Terms &amp; Conditions to create an account.</div>
      <!-- ──────────────────────────────────────────────────────── -->

      <button type="submit" class="btn btn-blue btn-full" style="margin-top:4px;padding:15px;font-size:1rem;">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:14px;color:var(--text-light);font-size:0.82rem;">
      Already have an account?
      <a href="login.html" style="color:var(--cyan-accent);font-weight:700;">Login here</a>
    </p>
    <p style="text-align:center;margin-top:6px;">
      <a href="index.html" style="color:rgba(255,255,255,0.4);font-size:0.78rem;">← Back to Home</a>
    </p>
  </div>

  <footer class="page-footer">© <span id="yr"></span> mech. All rights reserved.</footer>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();

function togglePw(id, btn) {
  const f = document.getElementById(id);
  f.type  = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🙈';
}

function showAlert(msg, type) {
  const el = document.getElementById('regAlert');
  el.textContent = msg;
  el.className   = 'alert-msg alert-' + type;
  el.style.display = 'block';
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  if (type === 'success') return;
  setTimeout(() => el.style.display = 'none', 5000);
}

// Auto-detect country from browser locale
const locale = navigator.language || 'en';
const region = locale.split('-')[1];
if (region) {
  try {
    const name = new Intl.DisplayNames(['en'], { type: 'region' }).of(region);
    if (name) document.getElementById('countryInput').value = name;
  } catch(e) {}
}

// Detect location
document.getElementById('detectLocBtn').addEventListener('click', function() {
  const btn = this;
  btn.textContent = '⏳ Detecting...';
  btn.disabled    = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`)
        .then(r => r.json())
        .then(d => {
          const addr = d.address || {};
          const loc  = [addr.city || addr.town || addr.village || addr.county, addr.state, addr.country]
            .filter(Boolean).join(', ');
          document.getElementById('locationText').value = loc;
          if (addr.country) document.getElementById('countryInput').value = addr.country;
          btn.textContent = '📍 Location Detected ✓';
        })
        .catch(() => { btn.textContent = '📍 DETECT MY LOCATION'; btn.disabled = false; });
    },
    () => { btn.textContent = '📍 DETECT MY LOCATION'; btn.disabled = false; }
  );
});

// Form submission
document.getElementById('driverRegForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  // Enforce T&C acceptance
  const terms = document.getElementById('termsAccept');
  const termsErr = document.getElementById('termsError');
  if (!terms.checked) {
    termsErr.style.display = 'block';
    terms.focus();
    return;
  }
  termsErr.style.display = 'none';

  const fd = new FormData(this);
  const payload = Object.fromEntries(fd.entries());

  if (!payload.full_name || !payload.phone || !payload.email || !payload.password) {
    return showAlert('Please fill in all required fields.', 'error');
  }
  if (payload.password.length < 8) {
    return showAlert('Password must be at least 8 characters.', 'error');
  }

  const btn = this.querySelector('[type="submit"]');
  btn.textContent = '⏳ Creating account...';
  btn.disabled    = true;

  try {
    const cfg = window.MechConfig || { API_BASE: 'http://localhost:5000' };
    const res = await fetch(`${cfg.API_BASE}/api/auth/register/driver`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('mech_token', JSON.stringify(data.token));
      localStorage.setItem('mech_user',  JSON.stringify(data.user));
      localStorage.setItem('mech_role',  JSON.stringify(data.role));
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard_driver.html', 1200);
    } else {
      showAlert(data.error || data.message || 'Registration failed.', 'error');
      btn.textContent = 'Create Account';
      btn.disabled    = false;
    }
  } catch(err) {
    showAlert('Network error — please try again.', 'error');
    btn.textContent = 'Create Account';
    btn.disabled    = false;
  }
});

// Show terms error inline as user interacts
document.getElementById('termsAccept').addEventListener('change', function() {
  document.getElementById('termsError').style.display = this.checked ? 'none' : 'block';
});
</script>
</body>
</html>
