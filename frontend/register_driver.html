<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6b21c8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="mech"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>mech — Driver Registration</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.SVG"/>
</head>
<body>
<div class="page-wrapper" style="align-items:center;padding-top:0;">
  <div style="width:100%;max-width:460px;padding:28px 0 32px;">

    <div class="logo-block">
      <div class="logo-ripple-wrap" style="width:90px;height:90px;">
        <span class="ripple-ring ripple-ring-1"></span>
        <span class="ripple-ring ripple-ring-2"></span>
        <span class="ripple-ring ripple-ring-3"></span>
        <div class="logo-circle"><img src="logo.SVG" alt="mech"/></div>
      </div>
      <span class="logo-name">mech</span>
      <span class="logo-tagline">The trusted partner for on-demand auto help.</span>
    </div>

    <h2 class="section-title" style="margin-bottom:6px;">Driver Registration</h2>

    <form id="driverRegForm" style="display:flex;flex-direction:column;gap:12px;margin-top:20px;">

      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input class="input-field" type="text" name="full_name" placeholder="Full Name" required autocomplete="name"/>
      </div>

      <div class="input-wrapper">
        <span class="input-icon">📞</span>
        <input class="input-field" type="tel" name="phone" id="phoneInput" placeholder="Phone Number" required autocomplete="tel"/>
      </div>

      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input class="input-field" type="email" name="email" placeholder="Email Address" required autocomplete="email"/>
      </div>

      <button type="button" id="detectLocBtn" class="btn btn-white btn-full" style="justify-content:flex-start;padding:13px 42px;font-size:0.95rem;font-weight:800;border-radius:var(--radius-md);">
        📍 DETECT MY LOCATION
      </button>

      <div class="input-wrapper">
        <span class="input-icon">📌</span>
        <input class="input-field" type="text" name="location_text" id="locationText" placeholder="Enter manually or from detected..."/>
      </div>

      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input class="input-field" type="password" name="password" placeholder="Create Password" required autocomplete="new-password" id="driverPw"/>
        <button type="button" data-toggle-pw="driverPw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;">👁</button>
      </div>

      <button type="submit" class="btn btn-blue btn-full" style="margin-top:8px;padding:15px;font-size:1rem;">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:14px;color:var(--text-light);font-size:0.82rem;">
      Already have an account?
      <a href="login.html" style="color:var(--cyan-accent);font-weight:700;">Login here</a>
    </p>
    <p style="text-align:center;margin-top:6px;color:var(--text-light);font-size:0.82rem;">
      <a href="login.html?tab=forgot" style="color:rgba(255,255,255,0.4);font-size:0.78rem;">Forgot password?</a>
    </p>
    <p style="text-align:center;margin-top:10px;">
      <a href="index.html" style="color:var(--cyan-accent);font-weight:700;font-size:0.82rem;">← Back to Home</a>
    </p>
  </div>

  <footer class="page-footer">© <span id="yr"></span> mech. All rights reserved.</footer>
</div>

<script src="js/app.js"></script>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
