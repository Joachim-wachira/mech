# ============================================================
# Mech Platform — Render.com Deployment Blueprint (ALL FREE)
# Deploy: Push to GitHub → Render Dashboard → "New Blueprint"
#
# ROOT CAUSE OF "Exited with status 4":
#   Docker runtime is NOT available on Render's free plan.
#   Exit code 4 = gunicorn worker import error caused by the
#   Docker container failing to start on an unsupported plan.
#
# FIX: Switch backend from runtime:docker to runtime:python
#   - Free plan supports native Python, Node, Ruby, Go, Rust
#   - Docker requires "starter" paid plan minimum
#   - Native Python runtime uses buildCommand + startCommand
#   - No Dockerfile needed at all on free plan
#
# OTHER FIXES IN THIS FILE:
#   1. runtime: python  (was: runtime: docker)
#   2. buildCommand     (replaces dockerfilePath/dockerContext)
#   3. startCommand     (replaces CMD in Dockerfile)
#   4. plan: free removed from static site  (causes validation error)
#   5. scaling removed  (not allowed on free)
#   6. region removed from static site  (not allowed on static)
# ============================================================

services:

  # ── Backend API + WebSocket (Native Python — Free Plan) ──────
  - type: web
    name: mech-backend
    runtime: python            # ← FIXED: was "docker" which requires paid plan
    rootDir: backend           # tells Render where the Python project root is
    region: frankfurt
    plan: free
    healthCheckPath: /health

    # Install all Python dependencies
    buildCommand: pip install -r requirements.txt

    # Start gunicorn with eventlet worker for WebSocket (Flask-SocketIO)
    # "app:application" means: file app.py → variable named "application"
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --timeout 120 app:application

    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mech-db
          property: connectionString
      - key: SMS_PROVIDER
        value: stub              # change to 'africastalking' when SMS is needed
      - key: AFRICASTALKING_USERNAME
        sync: false              # set manually in Render dashboard
      - key: AFRICASTALKING_API_KEY
        sync: false              # set manually in Render dashboard
      - key: SMS_SENDER
        value: MECH
      - key: NEARBY_RADIUS_KM
        value: "25"
      # PORT is injected automatically by Render — do not hardcode it

  # ── Static Frontend (Free) ───────────────────────────────────
  - type: web
    name: mech-frontend
    runtime: static
    staticPublishPath: ./frontend
    # No plan key — static sites are always free on Render
    # No region key — static sites use Render's global CDN automatically
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /css/*
        name: Cache-Control
        value: public, max-age=604800
      - path: /js/*
        name: Cache-Control
        value: public, max-age=604800
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database (Free — expires 90 days) ─────────────
databases:
  - name: mech-db
    databaseName: mech
    user: mech_admin
    plan: free
    postgresMajorVersion: "16"
