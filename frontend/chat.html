<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6b21c8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="mech"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>mech — Messages</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.SVG"/>
  <style>
    /* ── Chat layout ── */
    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-deep, #0f0f1a);
      position: relative;
    }

    /* ── Top tab bar ── */
    .chat-tab-bar {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1;
      padding: 14px 8px 12px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab.active {
      color: var(--cyan-accent, #06b6d4);
      border-bottom-color: var(--cyan-accent, #06b6d4);
    }
    .nav-tab .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }

    /* ── Page sections ── */
    .chat-page-section {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Conversations list ── */
    #page-conversations {
      overflow-y: auto;
    }
    #conversationList {
      flex: 1;
    }
    .conv-item:hover, .conv-item:active {
      background: rgba(255,255,255,0.05);
    }

    /* ── Conversation view (slides in over list) ── */
    #convView {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-deep, #0f0f1a);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 10;
    }
    #convView.open {
      transform: translateX(0);
    }
    .conv-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
    }
    #convBackBtn {
      background: none;
      border: none;
      color: var(--cyan-accent, #06b6d4);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      line-height: 1;
    }
    .conv-partner-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Messages area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-bubble-wrapper {
      display: flex;
      flex-direction: column;
    }
    .msg-bubble-wrapper.sent { align-items: flex-end; }
    .msg-bubble-wrapper.recv { align-items: flex-start; }
    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-bubble.sent {
      background: linear-gradient(135deg, var(--magenta, #9333ea), var(--cyan-accent, #06b6d4));
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble.recv {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    /* ── Message input ── */
    .msg-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      color: #fff;
      padding: 10px 16px;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
    }
    .msg-input::placeholder { color: rgba(255,255,255,0.35); }
    .msg-send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--magenta, #9333ea), var(--cyan-accent, #06b6d4));
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .msg-send-btn:active { opacity: 0.7; }

    /* ── Emergency contacts ── */
    #page-emergency {
      overflow-y: auto;
      padding: 16px 14px;
    }
    .emerg-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .emerg-icon { font-size: 1.8rem; flex-shrink: 0; }

    /* ── Bottom dash nav ── */
    .dash-nav {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .dash-nav-tab {
      flex: 1;
      padding: 10px 4px 8px;
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
      background: transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }
    .dash-nav-tab.active, .dash-nav-tab:hover { color: var(--cyan-accent, #06b6d4); }
    .d-icon { font-size: 1.3rem; display: block; margin-bottom: 2px; }

    /* ── Misc ── */
    .msg-badge-total {
      display: none;
      background: #ef4444;
      color: #fff;
      border-radius: 50%;
      font-size: 0.6rem;
      font-weight: 800;
      width: 16px; height: 16px;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 6px; right: 50%;
      transform: translateX(12px);
    }
  </style>
</head>
<body>

<div class="chat-shell">

  <!-- ── Top tab bar ── -->
  <div class="chat-tab-bar">
    <button class="nav-tab" data-page="conversations">
      <span class="tab-icon">💬</span>
      Chats
    </button>
    <button class="nav-tab" data-page="emergency">
      <span class="tab-icon">🚨</span>
      Emergency
    </button>
  </div>

  <!-- ── Conversations list section ── -->
  <div class="chat-page-section" id="page-conversations" style="display:flex;">
    <div id="conversationList">
      <div style="padding:40px 20px;text-align:center;color:#9ca3af;">
        Loading conversations…
      </div>
    </div>
  </div>

  <!-- ── Emergency contacts section ── -->
  <div class="chat-page-section" id="page-emergency">
    <div id="emergencyContactsList">
      <div style="padding:40px 20px;text-align:center;color:#9ca3af;">
        Loading emergency contacts…
      </div>
    </div>
  </div>

  <!-- ── Open conversation view (slides in) ── -->
  <div id="convView">
    <div class="conv-header">
      <button id="convBackBtn" aria-label="Back">‹</button>
      <div class="conv-partner-name" id="convPartnerName">Conversation</div>
    </div>

    <div class="messages-area"></div>

    <div class="msg-input-bar">
      <textarea class="msg-input" placeholder="Type a message…" rows="1"></textarea>
      <button class="msg-send-btn" aria-label="Send">➤</button>
    </div>
  </div>

  <!-- ── Bottom nav ── -->
  <nav class="dash-nav">
    <button class="dash-nav-tab" id="navHome" data-target="index.html">
      <span class="d-icon">🏠</span>Home
    </button>
    <button class="dash-nav-tab active" data-target="#">
      <span class="d-icon">💬</span>Chats
    </button>
    <button class="dash-nav-tab" data-target="profile.html">
      <span class="d-icon">👤</span>Profile
    </button>
  </nav>

</div><!-- /.chat-shell -->

<script src="config.js"></script>
<script src="js/app.js"></script>
<script>
  // Pages.chat() is the entry-point registered in app.js for chat.html
  if (typeof Pages !== 'undefined' && typeof Pages.chat === 'function') {
    Pages.chat();
  }

  // Auto-resize textarea
  const msgInput = document.querySelector('.msg-input');
  if (msgInput) {
    msgInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  }
</script>
</body>
</html>
