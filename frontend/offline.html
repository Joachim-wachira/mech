<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6b21c8"/>
  <title>mech — You're Offline</title>
  <style>
    :root {
      --bg:     #1a0533;
      --purple: #6b21c8;
      --orange: #d97706;
      --text:   #ffffff;
      --muted:  rgba(255,255,255,0.65);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 20% 10%, rgba(107,33,200,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(45,10,94,0.7) 0%, transparent 65%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      text-align: center;
    }

    /* Ripple rings on offline logo */
    .logo-ripple-wrap {
      position: relative;
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .ripple-ring {
      position: absolute;
      border-radius: 50%;
      border: 2.5px solid rgba(255,140,0,0.75);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(1);
      opacity: 0;
      animation: rippleExpand 3s ease-out infinite;
      width: 100%; height: 100%;
    }
    .ripple-ring-1 { animation-name: r1; animation-delay: 0s; }
    .ripple-ring-2 { animation-name: r2; animation-delay: 1s; }
    .ripple-ring-3 { animation-name: r3; animation-delay: 2s; }
    @keyframes r1 { 0%{transform:translate(-50%,-50%) scale(1);opacity:.88} 100%{transform:translate(-50%,-50%) scale(2.1);opacity:0} }
    @keyframes r2 { 0%{transform:translate(-50%,-50%) scale(1);opacity:.72} 100%{transform:translate(-50%,-50%) scale(2.25);opacity:0} }
    @keyframes r3 { 0%{transform:translate(-50%,-50%) scale(1);opacity:.55} 100%{transform:translate(-50%,-50%) scale(2.4);opacity:0} }

    .logo-circle {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, #c855f7, #22d3ee);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
      position: relative; z-index: 2;
      box-shadow: 0 0 30px rgba(200,85,247,0.5);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ box-shadow: 0 0 30px rgba(200,85,247,0.5); }
      50%    { box-shadow: 0 0 50px rgba(200,85,247,0.8); }
    }

    h1 { font-size: 1.9rem; font-weight: 900; margin-bottom: 8px; }
    h1 span { color: rgba(200,85,247,0.9); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--orange);
      margin: 16px 0 24px;
      backdrop-filter: blur(8px);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto 28px;
    }

    .retry-btn {
      background: linear-gradient(135deg, var(--purple), #9b59f5);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(107,33,200,0.45);
      transition: transform 0.2s, filter 0.2s;
    }
    .retry-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .retry-btn:active { transform: translateY(0); }

    .cached-links {
      margin-top: 36px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .cached-link {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .cached-link:hover {
      background: rgba(107,33,200,0.25);
      border-color: rgba(107,33,200,0.5);
    }

    footer {
      position: fixed; bottom: 16px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
    }

    .sparkle {
      position: fixed; bottom: 60px; right: 20px;
      font-size: 28px; opacity: 0.5;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <div class="logo-ripple-wrap">
    <span class="ripple-ring ripple-ring-1"></span>
    <span class="ripple-ring ripple-ring-2"></span>
    <span class="ripple-ring ripple-ring-3"></span>
    <div class="logo-circle">🚗</div>
  </div>

  <h1><span>mech</span> is offline</h1>

  <div class="status-badge">
    <span class="status-dot"></span>
    No internet connection
  </div>

  <p>
    It looks like you've lost your connection. Check your Wi-Fi or mobile data,
    then tap Retry to reconnect.
  </p>

  <button class="retry-btn" onclick="window.location.reload()">
    🔄 Retry Connection
  </button>

  <div class="cached-links">
    <a class="cached-link" href="/index.html">🏠 Home</a>
    <a class="cached-link" href="/dashboard_driver.html">🚗 Driver</a>
    <a class="cached-link" href="/dashboard_mechanic.html">🔧 Mechanic</a>
    <a class="cached-link" href="/dashboard_spareshop.html">🛒 Spare Shop</a>
    <a class="cached-link" href="/chat.html">💬 Chats</a>
  </div>


  <footer>© <span id="yr"></span> mech. All rights reserved.</footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      document.querySelector('.retry-btn').textContent = '✅ Back online! Redirecting...';
      setTimeout(() => window.history.back(), 1000);
    });
  </script>
</body>
</html>
